{{- if .Values.mistral.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mistral.model.name }}-sa-token
  namespace: {{ .Release.Namespace }}
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    kubernetes.io/service-account.name: {{ .Values.mistral.model.name }}-sa
    openshift.io/display-name: {{ .Values.mistral.model.displayName | quote }}
    opendatahub.io/model-name: {{ .Values.mistral.model.name | quote }}
type: kubernetes.io/service-account-token
{{- end }}

