{{- if .Values.mistral.enabled }}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: {{ .Values.mistral.model.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/runtime-version: v0.10.1.1
    opendatahub.io/accelerator-name: "nvidia"
    openshift.io/display-name: {{ .Values.mistral.model.displayName | quote }}
    opendatahub.io/template-display-name: "vLLM NVIDIA GPU ServingRuntime for KServe"
    opendatahub.io/template-name: vllm-cuda-runtime
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/apiProtocol: REST
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - name: kserve-container
      image: "{{ .Values.mistral.image.repository }}@{{ .Values.mistral.image.digest }}"
      imagePullPolicy: {{ .Values.mistral.image.pullPolicy }}
      command: ["python","-m","vllm.entrypoints.openai.api_server"]
      args:
        - "--port=8080"
        - "--model=/mnt/models"
        - "--served-model-name={{ .Values.mistral.model.name }}"
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
{{- end }}
